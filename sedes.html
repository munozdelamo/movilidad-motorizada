<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Proyecto de Movilidad Motorizada – Sedes</title>

  <!-- Estilos del proyecto -->
  <link rel="stylesheet" href="css/estilos.css" />
</head>

<body>
  <!-- ✅ ENCABEZADO -->
  <header>
    <div class="top-logos">
      <img src="bienestar.jpg" alt="Consejería de Bienestar Social">
      <img src="maestre.jpg" alt="IES Maestre de Calatrava">
      <img src="educacion.jpg" alt="Consejería de Educación">
    </div>
    <div class="title-container">
      <h1>Proyecto de Movilidad Motorizada</h1>
      <h2>Gestión de sedes</h2>
    </div>
  </header>

  <!-- ✅ MENÚ -->
  <nav class="menu">
    <ul>
            
      <li>
      
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="currentColor"
          xmlns="http://www.w3.org/2000/svg"
          style="vertical-align: middle; margin-right: 6px;"
        >
          <path d="M12 12c2.7 0 4.5-2 4.5-4.5S14.7 3 12 3 
                   7.5 5 7.5 7.5 9.3 12 12 12zm0 2
                   c-3 0-9 1.5-9 4.5V21h18v-2.5
                   c0-3-6-4.5-9-4.5z"/>
        </svg>
        <span id="nombreUsuario"></span>
        <button id="cerrarSesionBtn" class="btn-logout">
          ⛔ Logout
        </button>
      </a>
    </li>

    </ul>
  </nav>

  <!-- ✅ CONTENIDO PRINCIPAL -->
  <main>
    <h2 class="titulo-blanco">🏢 Gestión de Sedes</h2>

    <section class="charts-container">

      <!-- ➕ ALTA / MODIFICACIÓN -->
      <article>
        <form id="sedeForm">
          <h3 id="formTitle">Crear nueva sede</h3>

          <input type="hidden" id="sedeId">

          <div class="form-group">
            <label for="nombreSede">Nombre de la sede</label>
            <input type="text" id="nombreSede" required />
          </div>

          <div class="form-group">
            <label for="poblacion">Población</label>
            <input type="text" id="poblacion" required />
          </div>

          <button class="btn-primary" id="guardarSede">
            💾 Guardar sede
          </button>
        </form>
      </article>

      <!-- 📋 LISTADO -->
      <article>
        <h3>Sedes registradas</h3>
        <ul id="listaSedes" class="grid-sedes"></ul>
      </article>

    </section>
  </main>

  <!-- ✅ PIE -->
  <footer>
    <p>© 2026 Proyecto Movilidad Motorizada</p>
  </footer>

  <script type="module" src="js/sedes.js"></script>
</body>
</html>
