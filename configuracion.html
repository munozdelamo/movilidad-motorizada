<body>

  <!-- ✅ ENCABEZADO -->
  <header>
    <div class="top-logos">
      <img src="bienestar.jpg" alt="Consejería de Bienestar Social">

      <img src="educacion.jpg" alt="Consejería de Educación">
    </div>
    <div class="title-container">

  <main>
    <div style="margin-bottom:10px">

    </div>
    <section class="charts-container">

      <div style="display:flex; gap:30px; align-items:flex-start; flex-wrap:wrap;">
        <article>

          <form id="altaUsuarioForm">
            <h3>Crear nuevo usuario</h3>
            <div class="form-group" style="margin-top:5px"> <label for="nombreUsuario">Nombre</label> <input type="text"
                id="nombreUsuario" />
            </div>
            <div class="form-group" style="margin-top:5px">
              <label for="SSID">SSID</label> <input type="text" id="SSID" />
            </div>
            <div class="form-group" style="margin-top:5px">
              <label for="clave">Clave Wifi</label> <input type="text" id="clave" />
            </div>
            <button class="btn-primary" id="crearUsuario">➕ Crear usuario</button>
          </form>
      </div>
      </article>
      </div>
      <div style="display:flex; gap:30px; align-items:flex-start; flex-wrap:wrap;">
        <article>
          <h3 style="margin-top:30px">Usuarios registrados</h3>
          <div class="form-group" style="margin-top:5px"> <label for="nombreUsuario">Nombre</label> Usuario1

          <div class="form-group" style="margin-top:5px">
            <label for="SSID">SSID</label> MOVISTAR_1234
          </div>
          <div class="form-group" style="margin-top:5px">
            <label for="clave">Clave Wifi</label> 34567890

      </div>
